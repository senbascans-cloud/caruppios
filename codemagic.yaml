workflows:
  ios-workflow:
    name: CarUpp Build Test
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/CarUpp.xcworkspace"
        XCODE_SCHEME: "CarUpp"
    scripts:
      - name: Install CocoaPods
        script: | 
          cd ios && pod install
      - name: Build iOS (No Signing)
        script: | 
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --no-codesign # Sertifika kontrolünü atla
    artifacts:
      - build/ios/xcarchive/*.xcarchive
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - carupp@carupptr.com
